<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FZAstro OpenClaude Terminal</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #05080d; color: #d7e7ff; }
    #terminal { width: 100%; height: 100%; position: relative; }
    .xterm { height: 100%; width: 100%; }
    .xterm .xterm-viewport { overflow-y: auto; }
    .xterm .xterm-screen { overflow: hidden; }
    #fallback {
      display: none; box-sizing: border-box; width: 100%; height: 100%; overflow: auto;
      white-space: pre-wrap; word-break: break-word; padding: 12px;
      font: 13px/1.35 "Cascadia Mono", Consolas, "Liberation Mono", monospace;
      background: #05080d; color: #d7e7ff;
    }
    #fallback:focus { outline: 1px solid #4aa3ff; }
    .xterm { height: 100%; }
  </style>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
</head>
<body>
  <div id="terminal"></div>
  <div id="fallback" tabindex="0"></div>
<script>
(function () {
  let bridge = null;
  let term = null;
  let fitAddon = null;
  let fallback = document.getElementById('fallback');
  let terminalNode = document.getElementById('terminal');
  let xtermAutoFollow = true;
  let fallbackAutoFollow = true;

  function notifyReady(mode) {
    if (bridge && bridge.frontendReady) {
      bridge.frontendReady(mode);
    }
  }

  function sendToPython(data) {
    if (bridge && bridge.sendInput) {
      bridge.sendInput(data);
    }
  }

  function fallbackAtBottom() {
    return fallback.scrollTop + fallback.clientHeight >= fallback.scrollHeight - 4;
  }

  function writeFallback(text) {
    const follow = fallbackAutoFollow || fallbackAtBottom();
    fallback.textContent += String(text || '');
    if (follow) {
      fallback.scrollTop = fallback.scrollHeight;
      fallbackAutoFollow = true;
    }
  }

  function copyTextToClipboard(text) {
    const payload = String(text || '');
    if (!payload) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(payload).catch(function () {});
      return;
    }
    const area = document.createElement('textarea');
    area.value = payload;
    area.setAttribute('readonly', 'readonly');
    area.style.position = 'fixed';
    area.style.opacity = '0';
    document.body.appendChild(area);
    area.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(area);
  }

  function installFallbackPaste() {
    fallback.addEventListener('paste', function (event) {
      const text = event.clipboardData ? event.clipboardData.getData('text/plain') : '';
      if (text) {
        if (term && term.paste) { term.paste(text); } else { sendToPython(text); }
        event.preventDefault();
      }
    });
  }

  function installFallback() {
    terminalNode.style.display = 'none';
    fallback.style.display = 'block';
    writeFallback('[fzastro] xterm.js assets not found; using basic terminal transcript fallback.\n');
    fallback.addEventListener('scroll', function () {
      fallbackAutoFollow = fallbackAtBottom();
    });
    installFallbackPaste();
    fallback.addEventListener('keydown', function (event) {
      if (event.ctrlKey && event.key.toLowerCase() === 'c') { sendToPython('\x03'); event.preventDefault(); return; }
      if (event.ctrlKey && event.key.toLowerCase() === 'v') { return; }
      if (event.key === 'Enter') { sendToPython('\r'); event.preventDefault(); return; }
      if (event.key === 'Backspace') { sendToPython('\x7f'); event.preventDefault(); return; }
      if (event.key === 'Tab') { sendToPython('\t'); event.preventDefault(); return; }
      if (event.key.length === 1 && !event.metaKey && !event.altKey) { sendToPython(event.key); event.preventDefault(); }
    });
    window.fztermWrite = writeFallback;
    window.fztermClear = function () { fallback.textContent = ''; fallbackAutoFollow = true; };
    window.fztermFocus = function () { fallback.focus(); };
    window.fztermFit = function () {};
    window.fztermPasteText = function (text) { sendToPython(String(text || '')); fallback.focus(); };
    window.fztermScrollPageUp = function () { fallbackAutoFollow = false; fallback.scrollTop = Math.max(0, fallback.scrollTop - fallback.clientHeight); fallback.focus(); };
    window.fztermScrollPageDown = function () { fallback.scrollTop = Math.min(fallback.scrollHeight, fallback.scrollTop + fallback.clientHeight); fallbackAutoFollow = fallbackAtBottom(); fallback.focus(); };
    window.fztermScrollTop = function () { fallback.scrollTop = 0; fallbackAutoFollow = false; fallback.focus(); };
    window.fztermScrollBottom = function () { fallback.scrollTop = fallback.scrollHeight; fallbackAutoFollow = true; fallback.focus(); };
    window.fztermCopySelection = function () { copyTextToClipboard(window.getSelection ? window.getSelection().toString() : ''); };
    fallback.focus();
    notifyReady('basic-dom-fallback');
  }

  function reportSize() {
    if (term && bridge && bridge.resizeTerminal) {
      bridge.resizeTerminal(term.cols || 120, term.rows || 30);
    }
  }

  function isXtermAtBottom() {
    if (!term || !term.buffer || !term.buffer.active) return true;
    const buffer = term.buffer.active;
    return buffer.viewportY >= buffer.baseY - 1;
  }

  function fitAndReport(forceFollow) {
    const follow = Boolean(forceFollow) || xtermAutoFollow || isXtermAtBottom();
    if (fitAddon) {
      try { fitAddon.fit(); } catch (e) {}
    }
    reportSize();
    if (term && follow) {
      try { term.scrollToBottom(); } catch(e) {}
      xtermAutoFollow = true;
    }
    if (term && forceFollow) {
      try { term.focus(); } catch (e) {}
    }
  }

  function installXtermPasteHandlers() {
    const pasteTarget = (term && term.element) ? term.element : terminalNode;
    pasteTarget.addEventListener('paste', function (event) {
      const text = event.clipboardData ? event.clipboardData.getData('text/plain') : '';
      if (text) {
        if (term && term.paste) { term.paste(text); } else { sendToPython(text); }
        event.preventDefault();
      }
    });
  }

  function installXterm() {
    if (!window.Terminal) {
      installFallback();
      return;
    }
    fallback.style.display = 'none';
    terminalNode.style.display = 'block';
    term = new Terminal({
      cursorBlink: true,
      convertEol: false,
      scrollback: 20000,
      fontFamily: 'Cascadia Mono, Consolas, Liberation Mono, monospace',
      fontSize: 13,
      lineHeight: 1.1,
      windowsMode: true,
      disableStdin: false,
      fastScrollModifier: 'alt',
      theme: {
        background: '#05080d',
        foreground: '#d7e7ff',
        cursor: '#78b7ff',
        selectionBackground: '#255f9f',
        black: '#0b1119', red: '#ff6b6b', green: '#8bdc89', yellow: '#ffd166',
        blue: '#78b7ff', magenta: '#c792ea', cyan: '#7ee7ff', white: '#e6edf3',
        brightBlack: '#5f6b7a', brightRed: '#ff8a8a', brightGreen: '#a6f3a6',
        brightYellow: '#ffe08a', brightBlue: '#9dccff', brightMagenta: '#ddb2ff',
        brightCyan: '#a4f5ff', brightWhite: '#ffffff'
      }
    });
    if (window.FitAddon && window.FitAddon.FitAddon) {
      fitAddon = new window.FitAddon.FitAddon();
      term.loadAddon(fitAddon);
    }
    term.open(terminalNode);
    fitAndReport(true);
    window.setTimeout(function () { fitAndReport(true); }, 50);
    window.setTimeout(function () { fitAndReport(true); }, 250);
    window.setTimeout(function () { fitAndReport(true); }, 750);
    term.onData(function (data) { sendToPython(data); });
    if (term.onScroll) {
      term.onScroll(function () { xtermAutoFollow = isXtermAtBottom(); });
    }
    term.onResize(function (size) {
      if (bridge && bridge.resizeTerminal) bridge.resizeTerminal(size.cols, size.rows);
    });
    installXtermPasteHandlers();
    if (window.ResizeObserver) {
      const resizeObserver = new ResizeObserver(function () { fitAndReport(false); });
      resizeObserver.observe(terminalNode);
      resizeObserver.observe(document.body);
    }
    window.addEventListener('resize', function () { fitAndReport(false); });
    window.fztermWrite = function (text) {
      const follow = xtermAutoFollow || isXtermAtBottom();
      term.write(String(text || ''), function () {
        if (follow) {
          try { term.scrollToBottom(); } catch(e) {}
          xtermAutoFollow = true;
        }
      });
    };
    window.fztermClear = function () { term.clear(); xtermAutoFollow = true; };
    window.fztermFocus = function () { term.focus(); };
    window.fztermFit = function () { fitAndReport(false); };
    window.fztermPasteText = function (text) { const payload = String(text || ''); if (term.paste) { term.paste(payload); } else { sendToPython(payload); } term.focus(); };
    window.fztermScrollPageUp = function () { term.scrollPages(-1); xtermAutoFollow = false; term.focus(); };
    window.fztermScrollPageDown = function () { term.scrollPages(1); xtermAutoFollow = isXtermAtBottom(); term.focus(); };
    window.fztermScrollTop = function () { term.scrollToTop(); xtermAutoFollow = false; term.focus(); };
    window.fztermScrollBottom = function () { term.scrollToBottom(); xtermAutoFollow = true; term.focus(); };
    window.fztermCopySelection = function () { copyTextToClipboard(term.getSelection ? term.getSelection() : ''); term.focus(); };
    term.focus();
    notifyReady('xterm.js');
  }

  window.fztermWrite = function (text) {
    fallback.style.display = 'block';
    writeFallback(text);
  };
  window.fztermClear = function () { fallback.textContent = ''; fallbackAutoFollow = true; };
  window.fztermFocus = function () { fallback.focus(); };
  window.fztermFit = function () {};
  window.fztermPasteText = function (text) { sendToPython(String(text || '')); fallback.focus(); };
  window.fztermScrollPageUp = function () { fallbackAutoFollow = false; fallback.scrollTop = Math.max(0, fallback.scrollTop - fallback.clientHeight); fallback.focus(); };
  window.fztermScrollPageDown = function () { fallback.scrollTop = Math.min(fallback.scrollHeight, fallback.scrollTop + fallback.clientHeight); fallbackAutoFollow = fallbackAtBottom(); fallback.focus(); };
  window.fztermScrollTop = function () { fallback.scrollTop = 0; fallbackAutoFollow = false; fallback.focus(); };
  window.fztermScrollBottom = function () { fallback.scrollTop = fallback.scrollHeight; fallbackAutoFollow = true; fallback.focus(); };
  window.fztermCopySelection = function () { copyTextToClipboard(window.getSelection ? window.getSelection().toString() : ''); };

  if (typeof QWebChannel === 'undefined') {
    installFallback();
    return;
  }
  new QWebChannel(qt.webChannelTransport, function (channel) {
    bridge = channel.objects.fzTerminalBridge;
    window.setTimeout(installXterm, 0);
  });
})();
</script>
</body>
</html>
